# Builds the CmdPal extension on GitHub-hosted Windows runners (no local VS/.NET SDK required on your PC).
#
# The MSIX artifact is unsigned — fine for CI and manual sideload testing with Developer Mode.
# To ship a trusted package, follow https://learn.microsoft.com/windows/apps/package-and-deploy/ci-for-winui3
# (PFX in repo secrets + PackageCertificateKeyFile / signing step).
name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: |
          dotnet restore CmdPal_UniversalSearchHub_Extension.sln
          dotnet restore CmdPal_UniversalSearchHub_Extension\CmdPal_UniversalSearchHub_Extension.csproj -r win-x64

      - name: Build (Release, x64)
        run: dotnet build CmdPal_UniversalSearchHub_Extension.sln -c Release --no-restore /p:Platform=x64

      - name: Publish MSIX (unsigned)
        run: |
          dotnet publish CmdPal_UniversalSearchHub_Extension\CmdPal_UniversalSearchHub_Extension.csproj `
            -c Release `
            -r win-x64 `
            --no-restore `
            /p:Platform=x64 `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxPackageSigningEnabled=false `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxBundle=Never

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix-win-x64-unsigned
          path: "**/AppPackages/**/*.msix"
          if-no-files-found: warn
