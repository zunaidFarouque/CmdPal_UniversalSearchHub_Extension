# Builds and optionally signs the MSIX. See docs/Signing.md for secrets + trust cert.
#
# Without CMDPAL_PFX_BASE64: unsigned MSIX (needs Developer Mode or local signing to install).
# With secrets: signed MSIX + artifact "install-trust-certificate" (.cer) for Trusted People.
#
# Note: `secrets` cannot be used in `if:` expressions; signing is decided inside the script via env.
name: Build

# Paused: was push + PR; run manually from Actions tab when you want a build.
on:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: |
          dotnet restore CmdPal_UniversalSearchHub_Extension.sln
          dotnet restore CmdPal_UniversalSearchHub_Extension\CmdPal_UniversalSearchHub_Extension.csproj -r win-x64

      - name: Build (Release, x64)
        run: dotnet build CmdPal_UniversalSearchHub_Extension.sln -c Release --no-restore /p:Platform=x64

      - name: Publish MSIX
        id: msix
        env:
          PFX_B64: ${{ secrets.CMDPAL_PFX_BASE64 }}
          PFX_PASSWORD: ${{ secrets.CMDPAL_PFX_PASSWORD }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $root = $env:GITHUB_WORKSPACE
          $pfx = Join-Path $root 'CmdPal_CI.pfx'
          $cerOut = Join-Path $root 'CmdPal_CI_Public.cer'

          # Strip whitespace/newlines from secret (common paste mistake breaks Base64).
          $b64 = if ($env:PFX_B64) { ($env:PFX_B64 -replace '\s', '') } else { '' }
          $signed = $b64.Length -gt 0
          if ($signed) {
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($b64))
          }

          $proj = 'CmdPal_UniversalSearchHub_Extension\CmdPal_UniversalSearchHub_Extension.csproj'
          $args = @(
            'publish', $proj,
            '-c', 'Release',
            '-r', 'win-x64',
            '--no-restore',
            '/p:Platform=x64',
            '/p:GenerateAppxPackageOnBuild=true',
            '/p:UapAppxPackageBuildMode=SideloadOnly',
            '/p:AppxBundle=Never'
          )
          if ($signed) {
            $args += '/p:AppxPackageSigningEnabled=true'
            # Quote path for MSBuild (handles edge cases).
            $args += "/p:PackageCertificateKeyFile=`"$pfx`""
            if ($env:PFX_PASSWORD -and $env:PFX_PASSWORD.Trim().Length -gt 0) {
              $args += "/p:PackageCertificatePassword=$env:PFX_PASSWORD"
            }
          } else {
            $args += '/p:AppxPackageSigningEnabled=false'
          }
          dotnet @args

          if ($signed) {
            $msix = Get-ChildItem -Path $root -Recurse -Filter *.msix -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match 'AppPackages' } |
              Select-Object -First 1
            if (-not $msix) { throw 'Signed build: no .msix found under AppPackages.' }
            $signtool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter 'signtool.exe' -ErrorAction SilentlyContinue |
              Sort-Object FullName -Descending |
              Select-Object -First 1
            if (-not $signtool) { throw 'signtool.exe not found; cannot verify MSIX signature.' }
            Write-Host "Verifying signature: $($msix.FullName)"
            & $signtool.FullName verify /pa /v "$($msix.FullName)"
            if ($LASTEXITCODE -ne 0) { throw "MSIX is not signed or signature invalid (exit $LASTEXITCODE). Check PFX matches manifest Publisher." }
          }

          if ($signed) {
            if ($env:PFX_PASSWORD -and $env:PFX_PASSWORD.Trim().Length -gt 0) {
              $sec = ConvertTo-SecureString $env:PFX_PASSWORD -AsPlainText -Force
              $c = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfx, $sec, 'Exportable')
            } else {
              $c = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($pfx, [string]::Empty, 'Exportable')
            }
            [IO.File]::WriteAllBytes($cerOut, $c.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))
            Remove-Item -LiteralPath $pfx -Force
            Add-Content -Path $env:GITHUB_OUTPUT -Value "has_cer=true"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### MSIX signing"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Signed using CMDPAL_PFX_BASE64. Download artifact install-trust-certificate, import the CER to Local Machine Trusted People, then install the MSIX from msix-win-x64."
          } else {
            Add-Content -Path $env:GITHUB_OUTPUT -Value "has_cer=false"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### MSIX signing"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "Unsigned build (CMDPAL_PFX_BASE64 not set). Windows shows an unknown publisher unless you use Developer Mode. See docs/Signing.md."
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: msix-win-x64
          path: "**/AppPackages/**/*.msix"
          if-no-files-found: warn

      - name: Upload trust certificate
        if: steps.msix.outputs.has_cer == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: install-trust-certificate
          path: CmdPal_CI_Public.cer
          if-no-files-found: warn
